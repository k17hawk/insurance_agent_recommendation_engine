# Data Generation Configuration
data_generation:
  random_seed: 42
  observation_window_days: 30
  initial_exploration_rate: 0.15
  exploration_decay: 0.01
  n_brokers: 300
  n_leads: 15000

# Broker Configuration
broker_config:
  expertise_areas: ["auto", "home", "commercial", "bundle"]
  skill_params:
    new_broker_base: 0.50
    experienced_base: 0.65
    ribo_bonus: 0.10
    years_bonus_rate: 0.01
    skill_range: [0.3, 0.9]
    skill_std: 0.12
  reliability_params:
    mean: 0.85
    std: 0.10
    range: [0.50, 0.98]
  capacity_weights:
    "40": 0.40
    "50": 0.30
    "60": 0.20
    "75": 0.10
  expertise_counts:
    weights: [0.3, 0.5, 0.2]
    values: [1, 2, 3]
  language_distribution:
    English: 0.85
    French: 0.05
    Bilingual: 0.10
  commission_rate:
    min: 0.08
    max: 0.15
  cost_per_lead:
    min: 50
    max: 150
  efficiency:
    min: 0.5
    max: 1.5
  burnout_risk:
    min: 0.0
    max: 0.30

# Lead Configuration
lead_config:
  seasonality:
    1: 0.9
    2: 0.95
    3: 1.0
    4: 1.05
    5: 1.1
    6: 1.1
    7: 1.05
    8: 1.0
    9: 1.05
    10: 1.0
    11: 0.95
    12: 0.85
  insurance_types: ["auto", "home", "bundle"]
  insurance_distribution: [0.45, 0.25, 0.30]
  expected_premium_base:
    auto: 1400
    home: 800
    bundle: 2000
  hour_of_day_weights:
    9: 0.12
    10: 0.13
    11: 0.12
    12: 0.10
    13: 0.08
    14: 0.07
    15: 0.07
    16: 0.08
    17: 0.08
    18: 0.07
    19: 0.05
    20: 0.03
  tenure_weights:
    0: 0.4
    1: 0.2
    2: 0.15
    3: 0.1
    4: 0.08
    5: 0.07
  missing_data_rate: 0.07
  claims_distribution:
    none: 0.70
    minor: 0.20
    major: 0.10
  multi_product_intent_prob: 0.15
  patience_hours:
    exponential_scale: 48
    min: 6
    max: 168

# Market Regime Configuration
market_regime_config:
  initial_regime: "normal"
  regime_durations:
    normal: 100
    hard: 50
    soft: 40
  regime_transition:
    normal:
      hard: 0.3
      soft: 0.3
      normal: 0.4
    hard:
      normal: 0.6
      hard: 0.3
      soft: 0.1
    soft:
      normal: 0.7
      soft: 0.2
      hard: 0.1
  regime_effects:
    normal: 1.0
    hard: 0.7
    soft: 1.2

# Conversion Configuration
conversion_config:
  sigmoid_k: 5.0
  threshold: 0.5
  price_sensitivity_k: 2.0
  conversion_prob_range: [0.02, 0.35]
  claims_factors:
    major: 0.85
    minor: 0.95
  multi_product_factors:
    bundle_expertise: 1.15
    auto_home_expertise: 1.05

# Region Configuration
region_config:
  regions:
    Toronto: 0.30
    Mississauga: 0.10
    Brampton: 0.07
    Ottawa: 0.09
    Hamilton: 0.06
    London: 0.05
    Markham: 0.05
    Vaughan: 0.04
    Kitchener: 0.04
    Windsor: 0.03
    Oakville: 0.03
    Burlington: 0.03
    Kingston: 0.02
    Other_GTA: 0.05
    Other_Southwestern: 0.04
  nearby_regions:
    Toronto: ["Mississauga", "Markham", "Vaughan", "Oakville", "Other_GTA"]
    Mississauga: ["Toronto", "Brampton", "Oakville", "Burlington"]
    Brampton: ["Mississauga", "Toronto", "Vaughan"]
    Ottawa: ["Kingston"]
    Hamilton: ["Burlington", "Oakville"]
    London: ["Kitchener", "Windsor"]
    Oakville: ["Burlington", "Mississauga", "Toronto"]
    Burlington: ["Hamilton", "Oakville", "Mississauga"]
    Kingston: ["Ottawa"]

# Churn Configuration
churn_config:
  baseline_prob: 0.001
  low_skill_penalty: 0.020
  overcapacity_penalty: 0.010
  senior_penalty: 0.005
  high_burnout_penalty: 0.015
  burnout_threshold: 0.6
  capacity_overflow_threshold: 1.2
  churn_frequency: 500
  replacement_broker_skill:
    mean: 0.45
    std: 0.12
    range: [0.30, 0.80]

# Assignment Configuration
assignment_config:
  reentry_rate: 0.08
  max_reentry_depth: 1
  missing_data_log_rate: 0.02
  timestamp_jitter_rate: 0.03
  timestamp_jitter_hours: 5
  max_interactions_per_lead: 3
  response_time_scale: 3